benchmark:
  name: "rok_movement_task"
  mode: "empirical_benchmark"

dataset:
  path: "data/empirical/rok_movement_task.csv"
  participant_id_column: "subject_id"   # column name for participant ID in the CSV
  outcome_variable: "accuracy"          # binary 0/1 column
  task_context: |
    Participants see a cloud of moving arrows on each trial and must indicate the direction of 
    motion of the majority of arrows(up vs. down) by pressing a corresponding key. The arrows 
    also either point up or down, which is a task-irrelevant feature. The experiment measures the 
    accuracy with which participants can identify the direction of motion.
  base_factors:
    - {name: moving_up, dtype: continuous}
    - {name: moving_down, dtype: continuous}
    - {name: pointing_up, dtype: continuous}
    - {name: pointing_down, dtype: continuous}
  hidden_factors:               # columns present in the CSV but withheld from the pipeline
    - name: "movement_coherence"  # model-facing name (used in formulas and evaluation)
      column: "coherence_movement"  # actual CSV column name (omit if same as name)
      type: "within_trial"      # "within_trial" or "window"
    - name: "orientation_coherence"  # model-facing name (used in formulas and evaluation)
      column: "coherence_orientation"  # actual CSV column name (omit if same as name)
      type: "within_trial"      # "within_trial" or "window"
  extra_columns: ["trial_index", "coherent_movement_direction","block"]   # columns to keep in the dataframe but not model
  null_formula: "accuracy ~ C(moving_up) + C(moving_down) + C(pointing_up) + C(pointing_down)"   # auto-built if omitted
  full_formula: "accuracy ~ C(moving_up) + C(moving_down) + C(pointing_up) + C(pointing_down) + C(movement_coherence)"

discovery:
  sandbox_timeout_seconds: 30   # increase for large datasets (>50k rows)
  allowed_factor_classes: ["continuous"]
The evaluation section is optional: ground-t