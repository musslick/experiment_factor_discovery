benchmark:
  name: "rdk_task_switching_factor_discovery"
  type: "rdk_task_switching"

data_generation:
  n_participants: 100
  n_blocks_per_participant: 8    # 8 × 24 trials = 192 trials per participant
  outcome_variable: "correct"
  task_context: |
    This is a random-dot kinematogram (RDK) task-switching paradigm. On each
    trial, a random-dot stimulus is shown that varies in motion direction, colour,
    and orientation. A task cue instructs participants to classify one of these
    three dimensions on the current trial:
      motion      : is the net motion direction up or down?
      color       : is the dominant colour blue or red?
      orientation : is the dominant orientation left or right?
    Participants must respond based on the cued dimension only and ignore the
    other two. The correct response is fully determined by the task cue and the
    relevant stimulus feature.
    Motion, colour, and orientation coherence values (0–1) reflect how strongly
    the stimulus is biased toward one of the two levels on each dimension; higher
    coherence means easier discrimination.
    Accuracy (correct / incorrect) is the outcome to be predicted.
  base_factors:
    - {name: task,                  dtype: categorical, levels: [motion, color, orientation]}
    - {name: motion,                dtype: categorical, levels: [up, down]}
    - {name: color,                 dtype: categorical, levels: [blue, red]}
    - {name: orientation,           dtype: categorical, levels: [left, right]}
    - {name: motion_coherence,      dtype: continuous}
    - {name: color_coherence,       dtype: continuous}
    - {name: orientation_coherence, dtype: continuous}
    - {name: correct_response,      dtype: categorical, levels: [left, right], include_in_formula: false}
  hidden_factors:
    - "task_transition"
    - "current_stimulus_difficulty"
    - "past_stimulus_difficulty"
    - "n2_task_inhibition"
  logistic_model:
    intercept: 0.5
    terms:
      - {factor: task_transition,            level: repeat,     coefficient:  0.5}
      - {factor: current_stimulus_difficulty,                   coefficient: -0.8}
      - {factor: past_stimulus_difficulty,                      coefficient: -0.2}
      - {factor: n2_task_inhibition,         level: aba_return, coefficient: -0.4}

evaluation:
  ground_truth_factors:
    - name: "task_transition"
      type: "transition"
      factor_class: "discrete"
      levels: ["repeat", "switch"]
    - name: "current_stimulus_difficulty"
      type: "within_trial"
      factor_class: "continuous"
      levels: []
    - name: "past_stimulus_difficulty"
      type: "window"
      factor_class: "continuous"
      levels: []
    - name: "n2_task_inhibition"
      type: "window"
      factor_class: "discrete"
      levels: ["aba_return", "cba_nonreturn", "other"]
