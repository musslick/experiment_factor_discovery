benchmark:
  name: "stroop_factor_discovery"
  seed: 42
  output_dir: "results"

data_generation:
  n_participants: 100
  n_blocks_per_participant: 11   # 11 × 18 trials = 198 trials per participant
  hidden_factors:
    - "congruency"
    - "task_transition"
  logistic_model:
    intercept: 0.5
    congruent: 0.8        # congruency effect
    task_repeat: 0.4      # task repetition benefit
    response_repeat: 0.0  # not used in 2-factor prototype
    congruency_sequence: {}  # not used in 2-factor prototype

discovery:
  n_rounds: 2
  max_candidates_per_round: 5      # candidates generated in the first iteration of each round
  max_synthesis_retries: 2
  sandbox_timeout_seconds: 10
  sandbox_backend: "subprocess"     # "subprocess" (default) | "docker" (requires: pip install llm-sandbox)
  docker_image: "python:3.9-slim"   # Docker image used when sandbox_backend is "docker"
  # iterative within-round search
  candidates_per_refinement: 5      # candidates generated per subsequent refinement call
  max_search_iterations: 3           # total generate→score→refine cycles per round
  refinement_top_k: 3                # top candidates highlighted to LLM for refinement
  stability_weight: 1.0              # λ: penalises high SE in winner selection
  complexity_exponent: 1.0          # exponent on n_params=(n_levels−1) in winner score denominator
  depends_on_exponent: 0.5          # exponent on n_deps=len(depends_on) in winner score denominator
  cv_n_folds: 5                      # participant-wise CV folds for scoring
  validation_fraction: 0.20          # fraction of participants held out for validation
  min_validation_improvement: 0.001  # minimum mean per-participant LL gain to accept

llm:
  model: "claude-sonnet-4-6"
  max_tokens_candidate: 2000
  max_tokens_predicate: 1000
  candidate_temperature: 0.9
  predicate_temperature: 0.2

statistical:
  min_level_count: 5

evaluation:
  ground_truth_factors:
    - name: "congruency"
      type: "within_trial"
      levels: ["congruent", "incongruent"]
    - name: "task_transition"
      type: "transition"
      levels: ["repeat", "switch"]
  bijection_threshold: 0.95
