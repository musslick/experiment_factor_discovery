benchmark:
  name: "stroop_factor_discovery"
  type: "stroop"
  # Override shared n_rounds for this simpler 2-factor benchmark
  # (remove the override line to use the value from run.yaml)

data_generation:
  n_participants: 100
  n_blocks_per_participant: 11   # 11 × 18 trials = 198 trials per participant
  outcome_variable: "correct"
  task_context: |
    This is a Stroop task. On each trial participants see a colour word (e.g. "red",
    "blue", "green") printed in coloured ink and must perform one of two tasks:
      color_naming : report the ink colour (ignore the word meaning)
      word_reading : report the word meaning (ignore the ink colour)
    The motor response is determined by the task: ink colour → response in
    color_naming; word meaning → response in word_reading.
    Accuracy (correct / incorrect) is the outcome to be predicted.
  base_factors:
    - {name: task,  dtype: categorical, levels: [color_naming, word_reading]}
    - {name: color, dtype: categorical, levels: [red, blue, green]}
    - {name: word,  dtype: categorical, levels: [red, blue, green]}
  hidden_factors:
    - "congruency"
    - "task_transition"
  logistic_model:
    intercept: 0.5
    terms:
      - {factor: congruency,      level: congruent, coefficient: 0.8}
      - {factor: task_transition, level: repeat,    coefficient: 0.4}

discovery:
  allowed_factor_classes: ["discrete"]   # Stroop has no continuous hidden factors

evaluation:
  ground_truth_factors:
    - name: "congruency"
      type: "within_trial"
      levels: ["congruent", "incongruent"]
    - name: "task_transition"
      type: "transition"
      levels: ["repeat", "switch"]
