benchmark:
  name: "Grange_n-2_empirical"
  mode: "empirical_benchmark"

dataset:
  path: "data/empirical/grange_n-2_task.csv"
  participant_id_column: "subjectid"
  n_participants: 79
  outcome_variable: "latency"
  extra_columns: ["cue_image", "order", "trial"]
  null_formula: "np.log(latency) ~ C(stimulus) + C(task)"
  full_formula: "np.log(latency) ~ C(stimulus) + C(task) + C(csequence) + C(Response_Repitition) + C(task_transition)"
  task_context: |
    Participants are tasked to make a mental transformation of a stimulus object (hexagon, triangle or square) 
    in a cued direction (horizontal, vertical, diagonal). To indicate the transformed position, participants 
    are tasked to press 1,2,4 or 5 on the num-pad. 
  base_factors:
    - {name: stimulus, dtype: categorical, levels: [topLeft, topRight, bottomLeft, bottomRight]}
    - {name: task,  dtype: categorical, levels: [horizontal, vertical, diagonal]}
  hidden_factors:
    - name: "sequence"
      type: "window"
      levels: ["null", "CBA", "ABA"]
    - name: "Response_Repitition"
      type: "window"
      levels: ["switch", "repitiion"]
      column: "respRep"
    - name: "task_transition"
      type: "window"
      levels: ["switch", "repeat"]


discovery:
  allowed_factor_classes: ["discrete"]
  sandbox_timeout_seconds: 30

statistical:
  # Multi-outcome mode: outcome_variables overrides the single outcome_type above.
  # Primary outcome must match dataset.outcome_variable and the null_formula LHS.
  # For latency: the "np.log(...)" transform in the null_formula LHS is preserved automatically.
  # For accuracy: the LHS is replaced with the bare column name (no transform), and the
  #   logistic model family is selected by type: "binary".
  outcome_type: "continuous"  # latency → linear regression (GLM)
  mixed_effects: false

# No evaluation section needed: ground_truth_factors is auto-built from hidden_factors above.
